<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validação de Certificado · CG PLUS STUDIO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0E1A;--bg-soft:#0E1422;--surface:#121829;--surface-2:#161D31;
    --cyan:#22D3EE;--cyan-dim:#0E7490;--ink:#E8ECF4;--muted:#8A96AD;--faint:#5A6677;
    --line:#222B40;--ok:#34D399;--bad:#F87171;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Poppins',system-ui,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%, rgba(34,211,238,.08), transparent 60%),var(--bg);
    color:var(--ink);min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:32px 20px;line-height:1.55;-webkit-font-smoothing:antialiased;
  }
  .logo{width:120px;opacity:.92;margin-bottom:26px;filter:drop-shadow(0 0 14px rgba(34,211,238,.12))}
  .card{
    width:100%;max-width:500px;background:linear-gradient(180deg,var(--surface-2),var(--surface));
    border:1px solid var(--line);border-radius:18px;overflow:hidden;
    box-shadow:0 30px 80px -40px rgba(0,0,0,.9), 0 0 0 1px rgba(255,255,255,.02) inset;
  }
  .topband{height:3px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.7}
  .inner{padding:36px 34px 34px}
  .status{display:flex;align-items:center;gap:15px;margin-bottom:28px}
  .badge{
    width:50px;height:50px;flex:none;border-radius:14px;display:flex;align-items:center;justify-content:center;
    background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.3);color:var(--ok);
  }
  .badge svg{width:26px;height:26px}
  .badge.bad{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.3);color:var(--bad)}
  .status h1{font-size:1.2rem;font-weight:600;letter-spacing:-.01em}
  .status p{font-size:.8rem;color:var(--muted);font-weight:300;margin-top:2px}
  .rows{margin-top:4px}
  .row{padding:14px 0;border-top:1px solid var(--line)}
  .row .label{font-size:.62rem;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);font-weight:500;margin-bottom:4px}
  .row .value{font-size:1rem;color:var(--ink);font-weight:400}
  .row .value.big{font-size:1.22rem;font-weight:600;letter-spacing:-.01em}
  .grid2{display:flex;gap:0}
  .grid2 .row{flex:1;border-top:1px solid var(--line)}
  .grid2 .row+.row{padding-left:18px}
  .issuer{margin-top:22px;padding:16px 18px;background:var(--bg-soft);border:1px solid var(--line);border-radius:12px}
  .issuer .label{font-size:.6rem;text-transform:uppercase;letter-spacing:.18em;color:var(--cyan);font-weight:500;margin-bottom:7px}
  .issuer .name{font-size:.92rem;font-weight:600;color:var(--ink)}
  .issuer .meta{font-size:.76rem;color:var(--muted);font-weight:300;margin-top:2px}
  .footer{margin-top:24px;text-align:center;font-size:.68rem;color:var(--muted);font-weight:300;line-height:1.7}
  .footer code{display:inline-block;margin-top:4px;font-family:'SF Mono',Menlo,Consolas,monospace;font-size:.74rem;letter-spacing:.06em;color:var(--cyan);font-weight:500}
  .empty{text-align:center;padding:8px 0}
</style>
</head>

<script>
/* ===================================================================
   CONFIGURACAO - troque apenas a senha abaixo pela sua senha secreta.
   Use a MESMA senha aqui e no gerador. Nao compartilhe com ninguem.
   =================================================================== */
const SENHA_SECRETA = "TROQUE-ESTA-SENHA-POR-UMA-SUA-123";

const EMISSOR = { nome:"CG PLUS STUDIO", razao:"C G PLUS LTDA", cnpj:"40.462.893/0001-01" };
/* --- daqui pra baixo nao precisa mexer --- */

async function hash(texto){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(texto));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,16);
}
function getParam(n){ return new URLSearchParams(location.search).get(n) || ""; }
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// mascara o CPF mantendo so os blocos do meio: ***.456.789-**
function mascararCPF(cpf){
  const d = (cpf||'').replace(/\D/g,'');
  if(d.length !== 11) return cpf || '';
  return '***.'+d.slice(3,6)+'.'+d.slice(6,9)+'-**';
}

async function render(){
  const c = document.getElementById('content');
  const nome=getParam('n'), cpf=getParam('p'), curso=getParam('c'),
        ini=getParam('di'), fim=getParam('df'), carga=getParam('h'),
        inst=getParam('i'), id=getParam('id'), assin=getParam('s');

  if(!nome && !id){
    c.innerHTML = '<div class="status"><div class="badge bad">'+xIcon()+'</div>'+
      '<div><h1>Nenhum certificado</h1><p>Escaneie o QR code de um certificado para validá-lo.</p></div></div>';
    return;
  }
  // o CPF COMPLETO entra no hash; na tela mostramos mascarado
  const esperado = await hash([id,nome,cpf,curso,ini,fim,carga,inst,SENHA_SECRETA].join('|'));
  const valido = (esperado === assin);

  if(valido){
    c.innerHTML =
      '<div class="status"><div class="badge">'+checkIcon()+'</div>'+
      '<div><h1>Certificado válido</h1><p>Autenticidade confirmada por assinatura digital.</p></div></div>'+
      '<div class="rows">'+
        row('Aluno', nome, true)+
        row('CPF', mascararCPF(cpf))+
        row('Curso', curso)+
        row('Carga horária', carga)+
        '<div class="grid2">'+
          row('Início', ini)+
          row('Conclusão', fim)+
        '</div>'+
      '</div>'+
      '<div class="issuer"><div class="label">Emitido por</div>'+
        '<div class="name">'+esc(EMISSOR.nome)+'</div>'+
        '<div class="meta">'+esc(EMISSOR.razao)+' &middot; CNPJ '+esc(EMISSOR.cnpj)+'</div></div>'+
      '<div class="footer">Codigo de verificacao<br><code>'+esc(id)+'</code></div>';
  } else {
    c.innerHTML =
      '<div class="status"><div class="badge bad">'+xIcon()+'</div>'+
      '<div><h1>Certificado inválido</h1><p>A assinatura não confere. Este documento pode ter sido alterado.</p></div></div>'+
      '<div class="footer">Se você acredita que isto é um erro, entre em contato com a '+esc(EMISSOR.nome)+'.</div>';
  }
}
function row(label,value,big){
  return '<div class="row"><div class="label">'+label+'</div><div class="value '+(big?'big':'')+'">'+esc(value||'—')+'</div></div>';
}
function checkIcon(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>'}
function xIcon(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>'}
render();
</script>
